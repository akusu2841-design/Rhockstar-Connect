<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Register - Rhockstar Connect</title>
  <link rel="stylesheet" href="register.css">
</head>
<body>
  <a href="index.html">Home</a>

  <section class="loginPage"></section>
  <title>Login to Rhockstar Connect</title>

  <form id="loginForm">
    <label for="email">Email or Username:</label>
    <input type="email" name="email" id="email" placeholder="Enter your email or username" required>

    <label for="password">Password:</label>
    <input type="password" name="password" id="password" placeholder="Enter your password" required>
    
    <br><br>
    <input type="checkbox" id="showPassword">
    <label for="showPassword">Show password</label>

    <br><br>
    <input type="checkbox" name="rememberMe" id="rememberMe">
    <label for="rememberMe">Remember me</label>

    <button id="loginBtn">Login</button>
  </form>

  <p id="message"></p>
  <p>Dont have an account?<a href="register.html">Register</a></p>

  <script src="app.js"></script>
</body>
</html>
