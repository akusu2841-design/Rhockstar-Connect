<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Login - Rhockstar Connect</title>
  <link rel="stylesheet" href="login.css">
</head>
<body>
  <a href="index.html">Home</a>

  <div id="auth">
<section class="loginPage">
  <h2>Login to Rhockstar Connect</h2>
  <form id="loginForm">
    <label for="email">Email or Username:</label>
    <input type="text" name="email" id="email" placeholder="Enter your email or username" required>

    <label for="password">Password:</label>
    <input type="password" name="password" id="password" placeholder="Enter your password" required>
    
    <div class="checkbox-group">
    <label for="showPassword">Show password<input type="checkbox" id="showPassword"></label>
    </div>

    <div class="checkbox-group">
    <label for="rememberMe">Remember me<input type="checkbox" name="rememberMe" id="rememberMe"></label>
    </div>

    <button type="submit" id="loginBtn">Login</button>
  </form>

  <p id="message"></p>
  <p>Don't have an account?<a href="register.html">Register</a></p>
  </section>
  </div>
  <script src="js/utils.js"></script>
<script src="js/storage.js"></script>
<script src="js/login.js"></script>
</body>
</html>
