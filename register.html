<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Register - Rhockstar Connect</title>
  <link rel="stylesheet" href="register.css">
</head>
<body>
  <a href="index.html">Home</a>
  <a href="login.html">Already have an account? Login</a>
<div id="auth">
<section class="register">
  <h2>Create Account</h2>
  <form id="registerForm">

    <label for="name">Name:</label>
    <input type="text" name="name" id="fullName" placeholder="Enter your full name" required>

    <label for="email">Email:</label>
    <input type="email" name="email" id="email" placeholder="Enter your email" required>

    <label for="password">Password:</label>
    <input type="password" name="password" id="password" placeholder="Enter a unique password" required>
    <small class="password-rule">
      Password must be atleast 8 characters long and contain atleast:
      1 uppercase letter,1 lowercase letter,1 number,1 special character.
    </small>

    <button type="submit">Register</button>
  </form>
</section>
</div>
  <script src="register.js"></script>
</body>
