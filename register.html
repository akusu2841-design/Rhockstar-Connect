<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Register - Rhockstar Connect</title>
  <link rel="stylesheet" href="css/register.css">
</head>

<body>

  <div class="auth-nav">
    <a href="index.html">Home</a>
    <a href="login.html">Already have an account? Login</a>
  </div>

  <div id="auth">
    <section class="register">

      <h2>Create Account</h2>
      <p class="sub-text">Join Rhockstar Connect and start connecting</p>

      <!-- MESSAGE BOX -->
      <div id="messageBox" class="message-box"></div>

      <form id="registerForm">

        <!-- NAME -->
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="fullName" placeholder="Enter your full name" required>
        </div>

        <!-- USERNAME -->
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="username" placeholder="Choose a unique username" required>
          <small class="hint">This will be your public identity</small>
        </div>

        <!-- EMAIL -->
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" placeholder="Enter your email" required>
        </div>

        <!-- PASSWORD -->
        <div class="form-group">
          <label>Password</label>

          <div class="password-wrapper">
            <input type="password" id="password" placeholder="Create a strong password" required>
            <button type="button" id="togglePassword">👁</button>
          </div>

          <div class="password-strength">
            <span id="strengthBar"></span>
          </div>

          <small class="password-rule">
            Must contain 8+ characters, uppercase, lowercase, number & symbol
          </small>
        </div>

        <!-- CONFIRM PASSWORD -->
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" id="confirmPassword" placeholder="Re-enter password" required>
        </div>

        <!-- TERMS -->
        <div class="terms">
          <input type="checkbox" id="terms" required>
          <label for="terms">
            I agree to the Terms & Privacy Policy
          </label>
        </div>

        <!-- SUBMIT -->
        <button type="submit" id="registerBtn">
          Create Account
        </button>

        <p class="login-link">
          Already have an account? <a href="login.html">Login</a>
        </p>

      </form>
    </section>
  </div>

  <script src="js/utils.js"></script>
<script src="js/storage.js"></script>

<script type="module" src="js/register.js"></script>

</body>
</html>
